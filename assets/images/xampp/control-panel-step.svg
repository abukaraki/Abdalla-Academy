<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">XAMPP control panel step</title>
  <desc id="desc">Illustration showing Apache and MySQL running in the XAMPP control panel.</desc>
  <rect width="900" height="520" rx="18" fill="#f7f8fa"/>
  <rect x="85" y="75" width="730" height="370" rx="14" fill="#fff" stroke="#dbe2ea" stroke-width="3"/>
  <text x="125" y="122" font-family="Arial" font-size="24" font-weight="700" fill="#082f57">XAMPP Control Panel</text>
  <g font-family="Arial" font-size="18">
    <rect x="125" y="165" width="650" height="58" rx="8" fill="#e9f7ef" stroke="#b8e0c5"/>
    <text x="150" y="200" fill="#17202a">Apache</text>
    <rect x="560" y="178" width="90" height="32" rx="7" fill="#16805b"/>
    <text x="605" y="200" text-anchor="middle" fill="#fff" font-weight="700">Running</text>
    <rect x="125" y="242" width="650" height="58" rx="8" fill="#e9f7ef" stroke="#b8e0c5"/>
    <text x="150" y="277" fill="#17202a">MySQL</text>
    <rect x="560" y="255" width="90" height="32" rx="7" fill="#16805b"/>
    <text x="605" y="277" text-anchor="middle" fill="#fff" font-weight="700">Running</text>
    <rect x="125" y="320" width="650" height="58" rx="8" fill="#fff8ec" stroke="#f0c98e"/>
    <text x="150" y="355" fill="#17202a">Open browser: localhost</text>
  </g>
</svg>
